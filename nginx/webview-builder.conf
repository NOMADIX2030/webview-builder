# 웹뷰 앱 빌드 서비스 — nginx 설정 (Laravel 12.x)
# www.conf의 include로 로드. /, /index.php는 부모가 Laravel 12 공식 설정으로 처리.

# X-Accel-Redirect용 내부 location — PHP 버퍼 없이 nginx가 직접 파일 서빙
location /internal-download/ {
    internal;
    alias /Users/awekers/Sites/www/webview-builder/storage/app/;
}

# /api → Laravel (webview-builder/public/index.php)
# 빌드 요청(POST /api/build)은 2~5분 소요 → timeout 600초
# fastcgi_buffering off: fastcgi_temp 권한 오류 우회 (X-Accel-Redirect는 응답 작음)
location ^~ /api {
    fastcgi_pass 127.0.0.1:9000;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /Users/awekers/Sites/www/webview-builder/public/index.php;
    fastcgi_param SCRIPT_NAME /index.php;
    fastcgi_read_timeout 600;
    fastcgi_buffering off;
}

# /storage → Laravel storage (업로드 파일)
location ^~ /storage {
    alias /Users/awekers/Sites/www/webview-builder/storage/app/public;
}

# /, /index.php → 부모 www.conf의 location / + location ~ \.php$ 사용 (root=webview-builder/public)
